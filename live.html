<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CloudAI Live — Voice Chat</title>
  <meta name="description" content="CloudAI Live — Talk with CloudAI using real-time voice." />
  <link rel="icon" type="image/png" href="logo.png" />
  <link rel="stylesheet" href="assets/css/live.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="live-container">

    <!-- LOGO -->
    <div class="logo-wrapper">
      <img src="logo.png" id="live-logo" class="logo" alt="CloudAI" />
      <div id="status-text" class="status-text">Tap to Talk</div>
      <div id="interim-text" class="interim-text"></div>
    </div>

    <!-- WAVE BARS (animated when speaking) -->
    <div class="wave-bars" id="voice-wave">
      <span></span><span></span><span></span><span></span><span></span>
    </div>

    <!-- BUTTONS -->
    <div class="controls">
      <button id="speak-btn" class="main-button">🎙️ Tap to Speak</button>
      <button id="stop-btn"  class="stop-button" style="display:none">⏹ Stop</button>
    </div>

    <!-- BACK -->
    <a href="index.html" class="back-btn">← Back to Chat</a>
  </div>

  <script src="assets/js/live.js"></script>
</body>
</html>
