<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CloudAI — Smart AI Assistant</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <meta name="description" content="CloudAI — Fast, Smart AI Assistant by SRJahir Tech." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://cloudai.srjahir.in/" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-ZVLW6MTZ5Y"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag("js", new Date()); gtag("config", "G-ZVLW6MTZ5Y");
  </script>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
  <link rel="stylesheet" href="assets/css/style.css?v=19">
</head>
<body>

  <!-- Logo -->
  <div class="logo-box" onclick="location.href='live.html'">
    <img src="logo.png" class="logo-img" alt="CloudAI" />
    <div class="tap-talk">Tap to Talk</div>
  </div>

  <!-- Greeting -->
  <div class="greet-area">
    <h2>👋 Hi, I'm CloudAI.</h2>
    <p>Ask me anything.</p>
  </div>

  <!-- Chat -->
  <div id="chat-box"></div>

  <!-- Input Bar — Claude style -->
  <div class="input-area">
    <div class="input-inner">
      <button class="icon-btn" id="pin-btn" title="Attach file">
        <img src="Pin.png" alt="attach" />
      </button>
      <textarea id="user-input" placeholder="Message CloudAI..." rows="1"></textarea>
      <button class="icon-btn" id="mic-btn" title="Voice input">
        <img src="Mic.png" alt="mic" />
      </button>
      <button class="icon-btn" id="send-btn" title="Send">
        <img src="Send.png" alt="send" />
      </button>
    </div>
  </div>

  <!-- Attach Menu -->
  <div class="attach-menu" id="attachMenu">
    <button data-type="camera">📷 Camera</button>
    <button data-type="image">🖼️ Photo</button>
    <button data-type="file">📄 File</button>
  </div>

  <!-- Hidden inputs -->
  <input type="file" id="cameraInput" accept="image/*" capture="environment" hidden>
  <input type="file" id="imageInput"  accept="image/*" hidden>
  <input type="file" id="fileInput"   hidden>

  <!-- Footer -->
  <div style="text-align:center;padding:20px 16px 12px;font-size:12px;color:#555;border-top:1px solid #1a1a1a;margin-top:20px">
    <div style="margin-bottom:8px">
      <a href="blog.html" style="color:#777;text-decoration:none;margin:0 8px">Blog</a><a href="about.html" style="color:#777;text-decoration:none;margin:0 8px">About</a>
      <a href="contact.html" style="color:#777;text-decoration:none;margin:0 8px">Contact</a>
      <a href="privacy.html" style="color:#777;text-decoration:none;margin:0 8px">Privacy</a>
      <a href="terms.html" style="color:#777;text-decoration:none;margin:0 8px">Terms</a>
      <a href="disclaimer.html" style="color:#777;text-decoration:none;margin:0 8px">Disclaimer</a>
    </div>
    <div>© 2026 <a href="https://srjahir.in" target="_blank" style="color:#666;text-decoration:none">SRJahir Tech</a> — cloudai.srjahir.in</div>
  </div>

  <script src="assets/js/typing.js"></script>
  <script src="assets/js/chat.js?v=19"></script>

  <script>
    // Auto-resize textarea like Claude
    const ta = document.getElementById("user-input");
    ta.addEventListener("input", () => {
      ta.style.height = "auto";
      ta.style.height = Math.min(ta.scrollHeight, 160) + "px";
    });
  </script>
</body>
</html>
