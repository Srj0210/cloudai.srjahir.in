  <style>
    /* ── SUGGESTION CHIPS ─────────────────────── */
    .suggestions-wrap {
      padding: 20px 16px 8px;
      animation: fadeUp 0.4s ease;
    }
    .suggestions-title {
      text-align: center;
      font-size: 15px;
      color: #666;
      margin-bottom: 14px;
      font-weight: 500;
    }
    .chips-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      max-width: 600px;
      margin: 0 auto;
    }
    .chip {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 12px 14px;
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      color: #ccc;
      text-align: left;
      transition: all 0.2s;
      line-height: 1.4;
    }
    .chip:hover {
      background: rgba(0,200,255,0.08);
      border-color: rgba(0,200,255,0.3);
      color: #fff;
      transform: translateY(-2px);
    }
    .chip-icon { font-size: 18px; flex-shrink: 0; margin-top: -1px; }
    .chip-text { flex: 1; }

    /* ── AI ACTIONS ───────────────────────────── */
    .ai-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .action-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 12px;
      color: #888;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
    }
    .action-btn:hover { background: rgba(0,200,255,0.1); color: #00c8ff; border-color: rgba(0,200,255,0.3); }
    .share-btn:hover  { background: rgba(34,197,94,0.1);  color: #22c55e; border-color: rgba(34,197,94,0.3); }

    /* ── SHARE MODAL ──────────────────────────── */
    .share-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      animation: fadeIn 0.2s ease;
    }
    .share-modal-inner {
      background: #111;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 32px 28px;
      max-width: 420px;
      width: 90%;
      text-align: center;
      position: relative;
    }
    .share-close {
      position: absolute;
      top: 14px; right: 16px;
      background: none; border: none;
      color: #888; font-size: 18px; cursor: pointer;
    }
    .share-icon { font-size: 40px; margin-bottom: 12px; }
    .share-modal-inner h3 { color: #fff; margin: 0 0 6px; font-size: 18px; }
    .share-modal-inner p  { color: #888; margin: 0 0 14px; font-size: 13px; }
    .share-url {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 10px 12px;
      color: #00c8ff;
      font-size: 12px;
      font-family: monospace;
      margin-bottom: 16px;
    }
    .share-btns { display: flex; gap: 10px; justify-content: center; margin-bottom: 12px; }
    .share-twitter, .share-wa {
      display: inline-block;
      padding: 10px 18px;
      border-radius: 12px;
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      transition: opacity 0.2s;
    }
    .share-twitter { background: #000; color: #fff; border: 1px solid #333; }
    .share-wa      { background: #25d366; color: #fff; }
    .share-twitter:hover, .share-wa:hover { opacity: 0.85; }
    .share-note { color: #555; font-size: 11px; margin: 0; }

    /* ── SHARED CHAT BANNER ───────────────────── */
    .shared-banner {
      background: rgba(0,200,255,0.08);
      border: 1px solid rgba(0,200,255,0.2);
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 13px;
      color: #888;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .shared-banner a { color: #00c8ff; text-decoration: none; font-weight: 600; }

    /* ── IMAGE ACTIONS ────────────────────────── */
    .img-actions { display: flex; gap: 10px; margin-top: 10px; }

    /* ── TOP NAV ACTIONS ──────────────────────── */
    .nav-actions {
      position: fixed;
      top: 14px; right: 14px;
      display: flex; gap: 8px;
      z-index: 100;
    }
    .nav-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 7px 14px;
      font-size: 12px;
      color: #888;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
      text-decoration: none;
      display: flex; align-items: center; gap: 5px;
    }
    .nav-btn:hover { color: #fff; border-color: rgba(255,255,255,0.3); }

    /* ── BRANDING ─────────────────────────────── */
    .brand-badge {
      text-align: center;
      font-size: 11px;
      color: #444;
      padding: 4px 0 8px;
    }
    .brand-badge a { color: #555; text-decoration: none; }
    .brand-badge a:hover { color: #888; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }

    @media(max-width: 500px) {

      .nav-actions { top: 8px; right: 8px; }
      .nav-btn { padding: 6px 10px; font-size: 11px; }

  <!-- TTS Controls Bar -->
  <div class="tts-controls" id="ttsControls">
    <button class="tts-toggle-btn" id="ttsToggleBtn" onclick="toggleTTS()">🔊 Voice On</button>
    <div class="tts-speed-wrap">
      <span class="tts-speed-label">Speed</span>
      <input type="range" id="ttsSpeedSlider" min="0.7" max="1.8" step="0.1" value="1.1"
             oninput="changeTTSSpeed(this.value)" />
      <span class="tts-speed-val" id="ttsSpeedVal">1.1x</span>
    </div>
    <button class="tts-stop-btn" id="ttsStopBtn" onclick="stopAllSpeech()">⏹ Stop</button>
  </div>

  <!-- Input Bar -->
  <div class="input-area">
    <div class="input-inner">
      <button class="icon-btn" id="pin-btn" title="Attach file">📎</button>

      <div class="attach-menu" id="attachMenu">
        <button data-type="camera">📷 Camera</button>
        <button data-type="image">🖼 Image</button>
        <button data-type="file">📎 File</button>
      </div>

      <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none">
      <input type="file" id="imageInput"  accept="image/*" style="display:none">
      <input type="file" id="fileInput"   accept=".pdf,.docx,.doc,.txt,.csv,.json,.js,.py,.md" style="display:none">

      <textarea id="user-input" placeholder="Ask anything... (Hinglish bhi chalega 🇮🇳)" rows="1"></textarea>

      <button class="icon-btn" id="mic-btn" title="Voice input">🎤</button>
      <button class="icon-btn" id="send-btn" title="Send">⬆</button>
    </div>
  </div>

  <script src="assets/js/typing.js"></script>

  <script>
    // TTS Controls
    function toggleTTS() {
      ttsEnabled = !ttsEnabled;
      localStorage.setItem("cloudai_tts", ttsEnabled);
      const btn = document.getElementById("ttsToggleBtn");
      btn.textContent = ttsEnabled ? "🔊 Voice On" : "🔇 Voice Off";
      btn.className   = ttsEnabled ? "tts-toggle-btn active" : "tts-toggle-btn";
      if (!ttsEnabled) stopAllSpeech();
    }
    function stopAllSpeech() {
      if (window.currentAudio) { window.currentAudio.pause(); window.currentAudio = null; }
      window.speechSynthesis?.cancel();
    }
    function changeTTSSpeed(v) {
      document.getElementById("ttsSpeedVal").textContent = parseFloat(v).toFixed(1) + "x";
      localStorage.setItem("cloudai_tts_speed", v);
      window.ttsCurrentSpeed = parseFloat(v);
    }
    // Init
    window.addEventListener("DOMContentLoaded", () => {
      const btn = document.getElementById("ttsToggleBtn");
      const spd = parseFloat(localStorage.getItem("cloudai_tts_speed") || "1.1");
      btn.textContent = ttsEnabled ? "🔊 Voice On" : "🔇 Voice Off";
      btn.className   = ttsEnabled ? "tts-toggle-btn active" : "tts-toggle-btn";
      document.getElementById("ttsSpeedSlider").value = spd;
      document.getElementById("ttsSpeedVal").textContent = spd.toFixed(1) + "x";
      window.ttsCurrentSpeed = spd;
    });
  </script>
